<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sechs Sinne – Botschaften aus der Tierwelt</title>
  <style>
    :root { --accent: #4a7c59; --text: #2c3e50; }

    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, #e8f5e9, #dcedc8, #e8f5e9, #f1f8e9);
      background-size: 400% 400%; animation: gradientBG 15s ease infinite;
      min-height: 100vh; padding: 20px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wrap { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }

    header {
      text-align: center; padding: 40px 0 30px;
    }
    header .icon { font-size: 48px; display: block; margin-bottom: 10px; }
    header h1 {
      margin: 0; font-size: 32px; font-weight: 300;
      letter-spacing: 3px; color: var(--accent);
    }
    header p { margin: 8px 0 0; font-size: 15px; color: #888; }

    .block {
      background: rgba(255,255,255,0.94); padding: 28px; border-radius: 24px;
      margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .block-header {
      font-weight: 700; font-size: 12px; text-transform: uppercase;
      letter-spacing: 2px; color: var(--accent); margin-bottom: 14px;
    }

    textarea {
      width: 100%; min-height: 110px; padding: 16px;
      font-size: 17px; border: 1.5px solid #c8e6c9;
      border-radius: 14px; outline: none; font-family: inherit;
      resize: vertical; box-sizing: border-box; line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent); color: white; border: none;
      padding: 18px; border-radius: 18px; width: 100%;
      font-size: 18px; font-weight: bold; cursor: pointer;
      margin-top: 14px; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: none; border: 1.5px solid #ddd; color: #999;
      padding: 14px; border-radius: 16px; width: 100%;
      font-size: 15px; cursor: pointer; margin-top: 12px;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: #aaa; color: #666; }

    .animal-card {
      text-align: center;
      border: 2px solid rgba(74,124,89,0.2);
    }
    .animal-emoji { font-size: 64px; margin-bottom: 10px; }
    .animal-name { font-size: 26px; font-weight: bold; color: var(--text); }
    .animal-bedeutung {
      font-size: 12px; letter-spacing: 1.5px; color: var(--accent);
      text-transform: uppercase; margin-top: 6px;
    }

    .quote-block {
      margin-top: 18px; padding: 16px;
      background: rgba(74,124,89,0.07); border-radius: 14px;
      border-left: 3px solid var(--accent);
    }
    .quote-block p {
      margin: 0; font-style: italic; color: var(--accent); font-size: 16px;
    }

    ul { list-style: none; padding: 0; margin: 0; }
    li {
      font-size: 17px; margin-bottom: 18px; padding-left: 32px;
      position: relative; line-height: 1.6;
    }
    li::before { content: '✨'; position: absolute; left: 0; }

    .back-link { text-align: center; margin-top: 30px; }
    .back-link a { color: #bbb; font-size: 14px; text-decoration: none; }
    .back-link a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="icon">🌿</span>
      <h1>SECHS SINNE</h1>
      <p>Botschaften aus der Tierwelt empfangen</p>
    </header>

    <div id="app"></div>

    <div class="back-link">
      <a href="../">← zurück zu Seelenimpuls</a>
    </div>
  </div>

  <script>
    const tiere = {
      schmetterling: {
        name: "Schmetterling", emoji: "🦋",
        bedeutung: "Transformation · Leichtigkeit · Neubeginn",
        botschaft: "Du stehst mitten in einer Verwandlung. Der Schmetterling erscheint, wenn die Seele bereit ist, ihre alte Hülle loszulassen und in etwas Größeres hineinzuwachsen. Was war, darf vergehen.",
        buchhinweis: "Deine Seele kennt den Weg der Verwandlung. Vertraue dem Prozess.",
        ritual: ["Schreibe auf, was du loslassen möchtest – und zerreiße das Papier bewusst.", "Trage heute eine Farbe, die dich leicht und inspiriert fühlen lässt.", "Atme dreimal tief ein und stelle dir vor, wie Flügel deine Schultern heben."]
      },
      biene: {
        name: "Biene", emoji: "🐝",
        bedeutung: "Gemeinschaft · Fleiß · Süße des Lebens",
        botschaft: "Die Biene erinnert dich an die Kraft der Gemeinschaft und deine eigene Süße. Du bist gerufen, deine Gaben zu teilen – und dabei deinen eigenen Rhythmus zu finden.",
        buchhinweis: "Wie die Biene weißt du, was dir Kraft gibt. Kehre zu deiner Mitte zurück.",
        ritual: ["Genieße heute etwas Süßes bewusst und mit voller Aufmerksamkeit.", "Schreibe drei Gaben auf, die du in die Welt trägst.", "Summe oder singe einen Ton – lass deine Stimme schwingen."]
      },
      wolf: {
        name: "Wolf", emoji: "🐺",
        bedeutung: "Instinkt · Wildheit · Treue · innere Wahrheit",
        botschaft: "Der Wolf erscheint, wenn deine Wildheit und dein Instinkt gebraucht werden. Du hast ein tiefes Wissen in dir – vertraue ihm, auch wenn die anderen es nicht sehen.",
        buchhinweis: "Der Wolf in dir kennt den Weg. Er braucht keinen Beweis.",
        ritual: ["Gehe heute allein in die Natur und sei mit dir.", "Schreibe auf, was dein Instinkt dir schon lange sagen will.", "Lass die Emotion raus, die du zurückgehalten hast."]
      },
      adler: {
        name: "Adler", emoji: "🦅",
        bedeutung: "Überblick · Vision · Klarheit · Freiheit",
        botschaft: "Der Adler gibt dir Überblick. Steige heraus aus dem Gewirr des Alltags – du bist dazu berufen, die Dinge aus der Vogelperspektive zu sehen.",
        buchhinweis: "Von oben sieht alles kleiner aus. Du kannst den Überblick wählen.",
        ritual: ["Geh an einen erhöhten Ort – physisch Überblick gewinnen.", "Frage dich: Wie würde ich diese Situation aus der Distanz betrachten?", "Visualisiere, wie du hoch über deiner Situation schwebst – ruhig und klar."]
      },
      katze: {
        name: "Katze", emoji: "🐱",
        bedeutung: "Unabhängigkeit · Intuition · Selbstfürsorge · Grenzen",
        botschaft: "Die Katze erinnert dich an deine Eigenständigkeit und dein Recht auf Grenzen. Du darfst wählerisch sein. Du darfst Nein sagen. Du darfst dich zurückziehen.",
        buchhinweis: "Wie die Katze weißt du, was dir gut tut. Hör auf dieses Wissen.",
        ritual: ["Gib dir heute eine Stunde vollständig für dich allein – keine Verpflichtungen.", "Beobachte etwas ruhig und aufmerksam, ohne einzugreifen.", "Strecke deinen Körper bewusst – lang und vollständig, wie eine Katze beim Aufwachen."]
      },
      hund: {
        name: "Hund", emoji: "🐕",
        bedeutung: "Treue · Freundschaft · Vertrauen · Loyalität",
        botschaft: "Der Hund steht für bedingungslose Treue – zuerst zu dir selbst. Bist du dir selbst ein guter Freund? Er erinnert dich auch, wem du vertrauen darfst.",
        buchhinweis: "Sei dir selbst der beste Freund, den du dir wünschen kannst.",
        ritual: ["Tue heute etwas für dich, das du einem guten Freund gerne tun würdest.", "Danke einem Menschen, der dir treu ist.", "Gehe spazieren – einfach so, ohne Ziel."]
      },
      rabe: {
        name: "Rabe", emoji: "🪶",
        bedeutung: "Wahrheit · Wandel · Magie · Verborgenes",
        botschaft: "Der Rabe ist Bote des Wandels. Er erscheint, wenn verborgene Wahrheiten an die Oberfläche drängen. Schau hin, was du lieber nicht sehen wolltest.",
        buchhinweis: "Der Rabe zeigt, was hinter dem Schleier wartet. Schau mutig hin.",
        ritual: ["Schreibe im freien Fluss – was kommt, wenn du die Kontrolle loslässt?", "Sitze in der Dämmerung und beobachte den Übergang von Licht zu Dunkel.", "Frage dich ehrlich: Was verdränge ich gerade?"]
      },
      fuchs: {
        name: "Fuchs", emoji: "🦊",
        bedeutung: "Klugheit · Anpassung · Kreativität · Spielfreude",
        botschaft: "Der Fuchs ruft deine Cleverness und Anpassungsfähigkeit auf. Du besitzt mehr Weisheit, als du glaubst. Vertraue deinem Witz und deiner Beweglichkeit.",
        buchhinweis: "Deine Intelligenz ist dein Geschenk. Nutze sie mit Leichtigkeit.",
        ritual: ["Beobachte eine Situation heute mit spielerischer Neugierde statt mit Ernst.", "Frage dich: Welche kreative Lösung habe ich noch nicht in Betracht gezogen?", "Bewege dich heute leicht – und lass einen schweren Gedanken los."]
      },
      kaefer: {
        name: "Käfer", emoji: "🐞",
        bedeutung: "Beharrlichkeit · Achtsamkeit · das Kleine · Stärke",
        botschaft: "Der Käfer – klein und mächtig – erinnert dich daran, dass auch das Unscheinbare bedeutsam ist. Er steht für Beharrlichkeit und die Kraft, Lasten leicht zu tragen.",
        buchhinweis: "Das Kleine ist nicht unwichtig. Der Käfer weiß das.",
        ritual: ["Schau genau hin: Was in deinem Alltag verdient mehr Aufmerksamkeit?", "Wähle bewusst, eine Aufgabe leicht zu nehmen – nicht schwerer als nötig.", "Beobachte in der Natur etwas Kleines mit voller Aufmerksamkeit."]
      },
      eule: {
        name: "Eule", emoji: "🦉",
        bedeutung: "Weisheit · Intuition · Nacht · inneres Wissen",
        botschaft: "Die Eule bringt Weisheit und die Fähigkeit, im Dunkeln zu sehen. Wenn sie dir begegnet, ist es Zeit, auf deine innere Stimme zu hören – sie weiß mehr als dein Verstand.",
        buchhinweis: "Deine Seele weiß. Die Eule erinnert dich daran, zuzuhören.",
        ritual: ["Sitze in Stille und stelle deiner inneren Stimme eine Frage. Warte auf die Antwort.", "Schreibe in der Dämmerung oder Nacht – dieser Moment gehört der Weisheit.", "Schau in den Spiegel und frage: Was siehst du wirklich?"]
      },
      hirsch: {
        name: "Hirsch", emoji: "🦌",
        bedeutung: "Würde · Sanftheit · Stärke · Anmut",
        botschaft: "Der Hirsch steht für Würde, Sanftheit und innere Stärke. Er ruft dich, aufrecht zu gehen – mit Herz und Haltung, ohne dich klein zu machen.",
        buchhinweis: "Du darfst groß sein und sanft zugleich. Der Hirsch zeigt es dir.",
        ritual: ["Richte dich körperlich auf – Schultern zurück, Kopf hoch. Fühle deine Würde.", "Sprich heute mit sanfter Stimme, auch wenn du es mit Nachdruck meinst.", "Gehe in der Natur aufrecht und bewusst."]
      },
      schlange: {
        name: "Schlange", emoji: "🐍",
        bedeutung: "Häutung · Heilung · Urkraft · Erneuerung",
        botschaft: "Die Schlange ist Urkraft und Heilerin. Wenn sie erscheint, steht Häutung bevor – ein Loslassen des Alten, damit das Neue wachsen kann.",
        buchhinweis: "Die Schlange häutet sich, ohne Angst vor dem Neuen. Du auch.",
        ritual: ["Was ist 'alte Haut' in deinem Leben? Schreibe es auf und lass es bewusst los.", "Bewege deinen Körper fließend – Yoga, Tanzen, wellenartige Bewegungen.", "Trinke viel Wasser heute – reinige dich von innen."]
      },
      pferd: {
        name: "Pferd", emoji: "🐴",
        bedeutung: "Freiheit · Kraft · Bewegung · Bestimmung",
        botschaft: "Das Pferd ruft deine innere Freiheit und Kraft. Es ist Zeit, alte Einschränkungen abzuschütteln und dich frei zu bewegen – deiner eigenen Bestimmung entgegen.",
        buchhinweis: "Das Pferd rennt, weil es kann. Du auch.",
        ritual: ["Laufe heute – schnell, frei, ohne Ziel.", "Frage dich: Wo halte ich mich selbst zurück?", "Lass etwas los, das dich einsperrt – ein Glaubenssatz, eine Gewohnheit."]
      },
      frosch: {
        name: "Frosch", emoji: "🐸",
        bedeutung: "Reinigung · Emotionen · Übergang · Erneuerung",
        botschaft: "Der Frosch lebt zwischen den Welten – Wasser und Land, Gefühl und Realität. Er erscheint, wenn Reinigung und emotionale Erneuerung gefragt sind.",
        buchhinweis: "Das Wasser wäscht alles fort, was nicht mehr dir gehört.",
        ritual: ["Nimm ein bewusstes Bad oder eine lange Dusche – lass das Wasser alles abwaschen.", "Schreibe, was du emotional loslassen möchtest.", "Wage heute einen Schritt, den du aufgeschoben hast."]
      },
      loewe: {
        name: "Löwe", emoji: "🦁",
        bedeutung: "Mut · Herzfeuer · Führung · Würde",
        botschaft: "Der Löwe ruft dein Herzfeuer und deinen Mut. Steh zu deiner Meinung. Steh zu dir. Zeig dich in deiner vollen Größe, ohne dich zu entschuldigen.",
        buchhinweis: "Dein Mut ist dein Geschenk an die Welt. Zeig ihn.",
        ritual: ["Sage heute laut etwas, das du bisher nicht aussprechen konntest.", "Tue eine Sache mit voller Überzeugung – ohne Entschuldigung.", "Begrüße den Morgen bewusst: Stehe auf und recke dich in die Welt hinein."]
      }
    };

    const keywords = {
      schmetterling: ["schmetterling", "falter"],
      biene: ["biene", "bienen", "hummel"],
      wolf: ["wolf", "wölfe", "wölfen"],
      adler: ["adler", "falke", "greifvogel"],
      katze: ["katze", "kater", "kätzchen"],
      hund: ["hund", "hunde", "welpe"],
      rabe: ["rabe", "raben", "krähe", "krähen"],
      fuchs: ["fuchs", "füchse"],
      kaefer: ["käfer", "kaefer", "marienkäfer"],
      eule: ["eule", "uhu"],
      hirsch: ["hirsch", "reh", "rehkitz"],
      schlange: ["schlange", "schlangen"],
      pferd: ["pferd", "pferde"],
      frosch: ["frosch", "frösche", "kröte"],
      loewe: ["löwe", "löwen"]
    };

    function findAnimal(text) {
      const lower = text.toLowerCase();
      for (const [key, words] of Object.entries(keywords)) {
        if (words.some(w => lower.includes(w))) return tiere[key];
      }
      return null;
    }

    function renderInput() {
      document.getElementById('app').innerHTML = `
        <div class="block">
          <div class="block-header">🌿 Beschreibe dein Erlebnis</div>
          <p style="color:#888;font-size:15px;margin-top:0;">Welchem Tier bist du begegnet? Beschreibe kurz die Situation.</p>
          <textarea id="to-input" placeholder="z.B. Heute morgen saß ein Käfer auf meiner Fensterbank…"></textarea>
          <button class="btn-primary" id="to-btn">Botschaft empfangen ✨</button>
        </div>
        <div id="to-result"></div>
      `;

      document.getElementById('to-btn').onclick = () => {
        const input = document.getElementById('to-input');
        const text = input.value.trim();
        if (!text) { input.style.borderColor = '#e74c3c'; input.focus(); return; }
        input.style.borderColor = '#c8e6c9';
        showResult(findAnimal(text));
      };
    }

    function showResult(tier) {
      const result = document.getElementById('to-result');
      if (!tier) {
        result.innerHTML = `
          <div class="block" style="text-align:center;">
            <div style="font-size:40px;margin-bottom:12px;">🔍</div>
            <p style="font-size:17px;color:#888;">Das Tier konnte ich noch nicht erkennen.<br>Nenne es direkt – z.B. "Schmetterling", "Eule", "Wolf", "Käfer"…</p>
            <button class="btn-primary" id="retry-btn" style="max-width:300px;margin:10px auto 0;">Nochmal versuchen</button>
          </div>
        `;
        document.getElementById('retry-btn').onclick = () => {
          result.innerHTML = '';
          document.getElementById('to-input').value = '';
          document.getElementById('to-input').focus();
        };
        return;
      }

      result.innerHTML = `
        <div class="block animal-card">
          <div class="animal-emoji">${tier.emoji}</div>
          <div class="animal-name">${tier.name}</div>
          <div class="animal-bedeutung">${tier.bedeutung}</div>
        </div>
        <div class="block">
          <div class="block-header">💌 Botschaft für dich</div>
          <p style="font-size:18px;line-height:1.8;margin:0;">${tier.botschaft}</p>
          <div class="quote-block">
            <p>"${tier.buchhinweis}"</p>
          </div>
        </div>
        <div class="block">
          <div class="block-header">🌙 Dein Mini-Ritual</div>
          <ul id="ritual-list"></ul>
          <button class="btn-ghost" id="new-btn">← Neues Tier befragen</button>
        </div>
      `;

      const list = document.getElementById('ritual-list');
      tier.ritual.forEach(r => {
        const li = document.createElement('li');
        li.textContent = r;
        list.appendChild(li);
      });

      document.getElementById('new-btn').onclick = () => {
        result.innerHTML = '';
        document.getElementById('to-input').value = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      result.scrollIntoView({ behavior: 'smooth' });
    }

    renderInput();
  </script>
</body>
</html>
