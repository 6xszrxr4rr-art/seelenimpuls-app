<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Seelenimpuls</title>

  <style>
    :root {
      --bg1: #fdfeff;
      --bg2: #f4f8fb;
      --card: rgba(255, 255, 255, 0.95);
      --stroke: #eef2f5;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --accent: #3498db;
      --radius: 24px;
    }

    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .wrap { max-width: 500px; margin: 0 auto; position: relative; }

    /* Fokus auf den Impuls */
    h1 { font-size: 24px; text-align: center; margin: 20px 0 10px 0; font-weight: 300; letter-spacing: 1px; color: var(--muted); }
    
    .impuls-card {
      background: transparent;
      padding: 40px 20px;
      text-align: center;
      margin-bottom: 30px;
    }

    .sub { 
      font-size: 26px; 
      color: var(--text); 
      font-weight: 400;
      line-height: 1.5;
      font-style: italic;
      min-height: 4em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dezente Buttons auf der Startseite */
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      opacity: 0.7;
      font-size: 16px;
      padding: 12px;
      width: auto;
      margin: 0 auto;
      display: inline-block;
      min-width: 160px;
    }

    .btn-container { text-align: center; margin-top: 20px; }

    .btn, .situationBtn {
      display: block; width: 100%; border: none; border-radius: var(--radius); padding: 18px;
      font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
      touch-action: manipulation;
    }

    .btn-primary { background: var(--accent); color: white; margin-top: 40px; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.2); }
    .btn:active { transform: scale(0.98); }

    /* Situations-Auswahl */
    .situationBtn { background: var(--card); text-align: left; border: 1px solid var(--stroke); margin-bottom: 12px; padding: 22px; }
    .headline { font-size: 19px; font-weight: 700; display: block; color: var(--text); margin-bottom: 4px; }
    .hint { font-size: 14px; color: var(--muted); font-weight: 400; display: block; }

    /* Sanftes Einblenden der Übungs-Blöcke */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .block {
      background: var(--card); padding: 30px; border-radius: var(--radius); margin-top: 20px;
      border: 1px solid var(--stroke); box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .hidden { display: none !important; }
    .typed { white-space: pre-wrap; line-height: 1.8; font-size: 20px; color: #34495e; }
    
    ul { padding-left: 20px; margin: 0; list-style-type: '✨ '; }
    li { margin-bottom: 20px; font-size: 19px; line-height: 1.6; color: #445a70; }

    #situationTitleBox { padding: 15px; border-bottom: 1px solid var(--stroke); margin-bottom: 25px; text-align: center; }
    #blocksContainer { padding-bottom: 160px; } 

    #btnBackBottom { background: transparent; color: var(--muted); font-size: 14px; text-decoration: underline; margin-top: 40px; }
  </style>
</head>
<body>

  <div class="wrap">
    <div id="ui-home">
      <h1>Seelenimpuls</h1>
      <div class="impuls-card">
        <p class="sub" id="impuls">Atme tief ein. Du darfst gehalten sein.</p>
        <div class="btn-container">
            <button class="btn btn-ghost" id="btnImpuls">Neu inspirieren</button>
        </div>
      </div>
      <button class="btn btn-primary" id="btnContinue">Situation wählen</button>
    </div>

    <div id="ui-chooser" class="hidden">
      <div class="card">
        <p style="font-weight:400; font-size: 1.2em; margin-bottom: 25px; text-align:center; color: var(--muted);">Wähle eine Situation</p>
        <div id="situationsList">
          <button class="situationBtn" id="btnSituation1"><span class="headline">1) Innere Unruhe</span><span class="hint">Wenn die Gedanken kreisen.</span></button>
          <button class="situationBtn" id="btnSituation2"><span class="headline">2) Überforderung</span><span class="hint">Wenn alles zu viel wird.</span></button>
          <button class="situationBtn" id="btnSituation3"><span class="headline">3) Anspannung</span><span class="hint">Wenn der Körper fest ist.</span></button>
          <button class="situationBtn" id="btnSituation4"><span class="headline">4) Erschöpfung</span><span class="hint">Wenn die Kraft fehlt.</span></button>
          <button class="situationBtn" id="btnSituation5"><span class="headline">5) Traurigkeit</span><span class="hint">Wenn es schwer ist.</span></button>
          <button class="situationBtn" id="btnSituation6"><span class="headline">6) Innere Leere</span><span class="hint">Wenn der Halt fehlt.</span></button>
          <button class="situationBtn" id="btnSituation7"><span class="headline">7) Selbstzweifel</span><span class="hint">Wenn du unsicher bist.</span></button>
          <button class="situationBtn" id="btnSituation8"><span class="headline">8) Entscheidung</span><span class="hint">Wenn du zweifelst.</span></button>
          <button class="situationBtn" id="btnSituation9"><span class="headline">9) Übergang</span><span class="hint">Wenn Neues beginnt.</span></button>
          <button class="situationBtn" id="btnSituation10"><span class="headline">10) Angst & Sicherheit</span><span class="hint">Wenn du Schutz suchst.</span></button>
        </div>
        <button class="btn btn-ghost" id="btnBackFromChooser" style="margin-top: 20px; display: block; border: none;">Zurück</button>
      </div>
    </div>

    <div id="ui-run" class="hidden">
      <div id="situationTitleBox">
        <div class="headline" id="situationTitle" style="color: var(--accent); font-weight: 300; letter-spacing: 1px;"></div>
      </div>
      
      <div id="blocksContainer">
        <div class="block hidden" id="b1"><p class="typed" id="t1"></p></div>
        <div class="block hidden" id="b2"><p class="typed" id="t2"></p></div>
        <div class="block hidden" id="b3"><ul id="t3"></ul></div>
        <div class="block hidden" id="b4">
            <p style="font-weight:600; color:var(--accent); margin-bottom:15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">🌙 Mini-Ritual</p>
            <ul id="t4"></ul>
        </div>
        <div class="block hidden" id="b5"><p class="typed" id="t5" style="font-style: italic; text-align: center; color: var(--muted);"></p></div>
      </div>

      <button class="btn" id="btnBackBottom">Übung abbrechen</button>
    </div>

    <audio id="bgMusic" loop preload="auto"><source src="audio/stillness-space.mp3" type="audio/mpeg"></audio>
  </div>

  <script src="situations/situation-1.js" defer></script>
  <script src="situations/situation-2.js" defer></script>
  <script src="situations/situation-3.js" defer></script>
  <script src="situations/situation-4.js" defer></script>
  <script src="situations/situation-5.js" defer></script>
  <script src="situations/situation-6.js" defer></script>
  <script src="situations/situation-7.js" defer></script>
  <script src="situations/situation-8.js" defer></script>
  <script src="situations/situation-9.js" defer></script>
  <script src="situations/situation-10.js" defer></script>

  <script src="app.js" defer></script>
</body>
</html>
