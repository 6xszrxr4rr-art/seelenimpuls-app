<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Seelenimpuls</title>

  <style>
    :root {
      --bg-color: #f8fbfe;
      --text-color: #2c3e50;
      --accent-color: #4a90e2;
      --muted-color: #7f8c8d;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border-color: #e1e8ed;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden; /* Verhindert Scrollen der ganzen Seite */
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Ansichten */
    .view {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .hidden { display: none !important; }

    /* Header & Titel */
    h1 { font-weight: 300; font-size: 1.8rem; text-align: center; margin-bottom: 10px; }
    .situation-title { font-weight: 600; font-size: 1.2rem; color: var(--accent-color); text-align: center; margin-bottom: 20px; }

    /* Textbereich (Das Herzstück) */
    .content-area {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Hält Text mittig im Sichtfeld */
      padding-bottom: 40px;
    }

    .text-block {
      font-size: 1.3rem; /* Größerer Text */
      line-height: 1.6;
      margin-bottom: 25px;
      animation: fadeIn 1.2s ease-in-out;
      white-space: pre-wrap;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Dezentere Buttons */
    .btn-group { display: grid; gap: 10px; margin-top: auto; }

    .btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 15px;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { background: #f0f4f8; transform: scale(0.98); }
    .btn-main { border: 1px solid var(--accent-color); color: var(--accent-color); font-weight: 600; }
    
    .btn-back { 
      background: transparent; 
      border: none; 
      color: var(--muted-color); 
      font-size: 0.9rem; 
      margin-bottom: 10px;
      text-decoration: underline;
    }

    /* Listen-Styling */
    ul { padding-left: 20px; list-style-type: '✨ '; }
    li { margin-bottom: 15px; }

    .outro { font-style: italic; color: var(--accent-color); font-weight: 600; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="ui-home" class="view">
      <h1>Seelenimpuls</h1>
      <div class="content-area">
        <p id="impuls" class="text-block" style="text-align: center;">Atme tief ein. Du darfst jetzt ankommen.</p>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="nextImpuls()">Neuer Impuls</button>
        <button class="btn btn-main" onclick="showView('ui-chooser')">Situation wählen</button>
      </div>
    </div>

    <div id="ui-chooser" class="view hidden">
      <button class="btn-back" onclick="showView('ui-home')">← Zurück</button>
      <h1 style="font-size: 1.4rem;">Was brauchst du gerade?</h1>
      <div class="content-area" style="justify-content: flex-start;">
        <div id="situationsList" class="btn-group" style="margin-top: 10px;">
          </div>
      </div>
    </div>

    <div id="ui-run" class="view hidden">
      <div class="situation-title" id="displayTitle"></div>
      <div class="content-area" id="mainContent">
        </div>
      <div id="actionArea" class="btn-group hidden">
        <button class="btn btn-main" id="btnSong">Gesungene Affirmation hören</button>
        <button class="btn-back" onclick="stopRun()">Übung beenden</button>
      </div>
    </div>

  </div>

  <audio id="bgMusic" loop><source src="audio/stillness-space.mp3" type="audio/mpeg"></audio>
  <audio id="songPlayer"></audio>

  <script src="situations/situation-1.js" defer></script>
  <script src="situations/situation-2.js" defer></script>
  <script src="situations/situation-10.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
