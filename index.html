<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Seelenimpuls</title>
  <style>
    :root {
      --accent: #4a90e2;
      --text: #2c3e50;
      --bg-gradient: linear-gradient(-45deg, #eef2f3, #e3f2fd, #e8f5e9, #f3e5f5);
    }

    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      color: var(--text); background: var(--bg-gradient);
      background-size: 400% 400%; animation: gradientBG 15s ease infinite;
      min-height: 100vh; padding: 20px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wrap { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
    
    .block {
      background: rgba(255, 255, 255, 0.94); padding: 30px; border-radius: 28px; 
      margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.7);
      transition: all 0.5s ease;
    }

    .block-header {
      font-weight: 700; font-size: 13px; text-transform: uppercase; 
      letter-spacing: 2px; color: var(--accent); margin-bottom: 15px;
    }

    /* Der Anker für die Schrift */
    .typed-anchor { 
      font-size: 22px; line-height: 1.6; position: relative; display: block;
    }

    /* NEU: Großer, präsenter Impuls-Button */
    #btnImpuls {
      background: white; border: 2.5px solid var(--accent); color: var(--accent);
      padding: 20px 45px; border-radius: 40px; font-size: 20px; font-weight: 700;
      cursor: pointer; margin: 30px 0; transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(74, 144, 226, 0.15);
    }
    #btnImpuls:hover { background: #f8fbff; transform: translateY(-2px); }
    #btnImpuls:active { transform: scale(0.96); }

    .btn-primary { 
      background: var(--accent); color: white; border: none; padding: 22px; 
      border-radius: 20px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer;
    }

    .situationBtn {
      width: 100%; background: rgba(255, 255, 255, 0.8); border: 1px solid #eee; 
      padding: 25px; border-radius: 22px; margin-bottom: 15px; text-align: left;
    }

    .headline { font-size: 20px; font-weight: bold; display: block; color: var(--accent); }
    .hint { font-size: 15px; color: #7f8c8d; }

    #btnBackBottom { 
      background: rgba(255, 255, 255, 0.6); border: 1px solid #d1d5db; 
      color: #718096; width: 100%; padding: 20px; border-radius: 20px; 
      font-weight: bold; margin-top: 50px; cursor: pointer;
    }

    .hidden { display: none !important; }
    
    .breath-container { display: none; text-align: center; padding: 40px 0; }
    .breath-circle {
      width: 120px; height: 120px; border-radius: 50%; border: 5px solid var(--accent);
      margin: 0 auto; animation: breathe 8s infinite ease-in-out;
    }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.4); opacity: 1; } }

    ul { list-style: none; padding: 0; }
    li { font-size: 21px; margin-bottom: 20px; padding-left: 35px; position: relative; }
    li::before { content: '✨'; position: absolute; left: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="ui-home">
      <h1 style="text-align: center; font-weight: 300; letter-spacing: 2px;">SEELENIMPULS</h1>
      <div style="padding: 50px 10px; text-align: center;">
        <p id="impuls" style="font-size: 26px; font-style: italic;">Atme tief ein.</p>
        <button id="btnImpuls">Neuer Impuls</button>
      </div>
      <button class="btn-primary" id="btnContinue">Situation wählen</button>
    </div>

    <div id="ui-chooser" class="hidden">
      <div id="situationsList">
        <button class="situationBtn" id="btnSituation1"><span class="headline">1) Innere Unruhe</span><span class="hint">Gedanken kreisen</span></button>
        <button class="situationBtn" id="btnSituation2"><span class="headline">2) Überforderung</span><span class="hint">Alles zu viel</span></button>
        <button class="situationBtn" id="btnSituation3"><span class="headline">3) Anspannung</span><span class="hint">Körperlich loslassen</span></button>
        <button class="situationBtn" id="btnSituation4"><span class="headline">4) Erschöpfung</span><span class="hint">Kraft tanken</span></button>
        <button class="situationBtn" id="btnSituation5"><span class="headline">5) Traurigkeit</span><span class="hint">Gefühle zulassen</span></button>
        <button class="situationBtn" id="btnSituation6"><span class="headline">6) Innere Leere</span><span class="hint">Halt finden</span></button>
        <button class="situationBtn" id="btnSituation7"><span class="headline">7) Selbstzweifel</span><span class="hint">Vertrauen finden</span></button>
        <button class="situationBtn" id="btnSituation8"><span class="headline">8) Entscheidung</span><span class="hint">Klarheit gewinnen</span></button>
        <button class="situationBtn" id="btnSituation9"><span class="headline">9) Übergang</span><span class="hint">Neues begrüßen</span></button>
        <button class="situationBtn" id="btnSituation10"><span class="headline">10) Angst & Sicherheit</span><span class="hint">Geborgen sein</span></button>
      </div>
      <button id="btnBackFromChooser" style="width:100%; border:none; background:none; color:#95a5a6; padding:20px;">Zurück</button>
    </div>

    <div id="ui-run" class="hidden">
      <div id="blocksContainer">
        <div class="block hidden" id="b1"><div class="block-header">🌿 Ankommen</div><div class="typed-anchor" id="t1"></div></div>
        <div class="block hidden" id="b2"><div class="block-header">💡 Einblick</div><div class="typed-anchor" id="t2"></div></div>
        <div id="breathBox" class="breath-container"><div class="breath-circle"></div><p style="margin-top:15px; color:var(--accent)">Einatmen... Ausatmen...</p></div>
        <div class="block hidden" id="b3"><div class="block-header">✨ Kraftsätze</div><ul id="t3"></ul></div>
        <div class="block hidden" id="b4"><div class="block-header">🌙 Mini-Ritual</div><ul id="t4"></ul></div>
        <div class="block hidden" id="b5"><div class="block-header">🎶 Abschluss</div><div class="typed-anchor" id="t5"></div><div id="audioContainer"></div></div>
      </div>
      <button id="btnBackBottom">ÜBUNG BEENDEN</button>
    </div>
  </div>
  <script src="situations/situation-1.js"></script>
  <script src="situations/situation-2.js"></script>
  <script src="situations/situation-3.js"></script>
  <script src="situations/situation-4.js"></script>
  <script src="situations/situation-5.js"></script>
  <script src="situations/situation-6.js"></script>
  <script src="situations/situation-7.js"></script>
  <script src="situations/situation-8.js"></script>
  <script src="situations/situation-9.js"></script>
  <script src="situations/situation-10.js"></script>
  <script src="app.js"></script>
</body>
</html>
