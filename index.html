<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Seelenimpuls</title>

  <style>
    :root {
      --bg1: #eef3f6;
      --bg2: #f7fbff;
      --card: rgba(255, 255, 255, 0.85);
      --stroke: #e6edf3;
      --text: #1b1f24;
      --muted: #5a6672;
      --accent: #1f7ae0;
      --radius: 18px;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Fix für klickbare Hintergründe */
    body::before, body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none; /* WICHTIG: Klicks durchlassen */
      z-index: -1;
    }

    .wrap { max-width: 600px; margin: 0 auto; position: relative; }

    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    h1 { font-size: 32px; text-align: center; margin-bottom: 10px; }
    .sub { font-size: 22px; color: var(--accent); text-align: center; font-style: italic; margin-bottom: 20px; }

    /* Button Optimierung */
    .btn, .situationBtn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
      touch-action: manipulation;
      position: relative;
      z-index: 10; /* Über den Hintergrund */
      text-decoration: none;
      text-align: center;
    }

    .btn { background: #eaf2ff; color: var(--accent); border: 1px solid rgba(31,122,224,0.2); }
    .btn-primary { background: var(--accent); color: white; margin-top: 10px; }
    .btn:active { transform: scale(0.98); }

    .situationBtn {
      background: white;
      text-align: left;
      border: 1px solid var(--stroke);
      margin-bottom: 12px;
    }

    .headline { font-size: 20px; font-weight: 800; display: block; }
    .hint { font-size: 14px; color: var(--muted); font-weight: 400; }

    .block {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      margin-top: 15px;
      border: 1px solid var(--stroke);
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }
    .typed { white-space: pre-wrap; line-height: 1.5; font-size: 18px; }
    
    #topSpacer { height: 20px; }
  </style>
</head>
<body>

  <div class="wrap">
    <div id="ui-home">
      <div class="card" id="topCard">
        <h1>Seelenimpuls ✨</h1>
        <p class="sub" id="impuls">Atme tief ein. Du darfst jetzt ankommen.</p>
        <button class="btn" id="btnImpuls">Neuer Impuls</button>
      </div>

      <div id="topSpacer"></div>

      <div class="card" id="continueCard">
        <button class="btn btn-primary" id="btnContinue">Situation wählen</button>
      </div>
    </div>

    <div id="ui-chooser" class="hidden">
      <div class="card">
        <p style="font-weight:700;">Was brauchst du gerade?</p>
        <div id="situationsList">
          <button class="situationBtn" id="btnSituation1">
            <span class="headline">1) Innere Unruhe</span>
            <span class="hint">Wenn die Gedanken kreisen.</span>
          </button>
          <button class="situationBtn" id="btnSituation2">
            <span class="headline">2) Überforderung</span>
            <span class="hint">Wenn alles zu viel wird.</span>
          </button>
          </div>
        <button class="btn" id="btnBackFromChooser">Zurück</button>
      </div>
    </div>

    <div id="ui-run" class="hidden">
      <div class="card">
        <div class="headline" id="situationTitle" style="text-align:center;"></div>
      </div>
      
      <div id="blocksContainer">
        <div class="block hidden" id="b1"><p class="typed" id="t1"></p></div>
        <div class="block hidden" id="b2"><p class="typed" id="t2"></p></div>
        <div class="block hidden" id="b3"><ul id="t3"></ul></div>
      </div>

      <button class="btn" id="btnBackBottom" style="margin-top:20px;">Abbrechen & Zurück</button>
    </div>

    <audio id="bgMusic" loop><source src="audio/stillness-space.mp3" type="audio/mpeg"></audio>
  </div>

  <script src="situations/situation-1.js?v=1" defer></script>
  <script src="situations/situation-2.js?v=1" defer></script>
  <script src="app.js?v=1002" defer></script>
</body>
</html>
