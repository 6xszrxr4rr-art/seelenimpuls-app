<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Seelenimpuls</title>

  <style>
    :root {
      --bg: #f8fbfe;
      --accent: #4a90e2;
      --text: #2c3e50;
      --card: #ffffff;
    }

    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 20px;
      line-height: 1.6;
    }

    .wrap { max-width: 500px; margin: 0 auto; }

    /* Überschriften in den Blöcken */
    .block-header {
      color: var(--accent);
      font-weight: bold;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: block;
    }

    .block {
      background: var(--card);
      padding: 30px;
      border-radius: 25px;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #edf2f7;
      /* Animation entfernt, damit nichts springt oder rast */
    }

    /* Viel größere Schrift für bessere Lesbarkeit */
    .typed { 
      font-size: 22px; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
    }

    ul { padding: 0; list-style: none; }
    li { 
      font-size: 21px; 
      margin-bottom: 20px; 
      padding-left: 35px; 
      position: relative; 
    }
    li::before { content: '✨'; position: absolute; left: 0; }

    /* Situations-Buttons: Groß und gut lesbar */
    .situationBtn {
      width: 100%;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 15px;
      text-align: left;
      display: block;
      cursor: pointer;
    }

    .headline { 
      font-size: 22px; /* Deutlich größer */
      font-weight: 800; 
      display: block; 
      color: var(--text);
      margin-bottom: 5px;
    }
    .hint { font-size: 16px; color: #718096; }

    /* Atem-Kreis */
    .breath-container { display: none; text-align: center; padding: 30px; }
    .breath-circle {
      width: 120px; height: 120px; border-radius: 50%;
      border: 5px solid var(--accent); margin: 0 auto;
      animation: breathe 8s infinite ease-in-out;
    }
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }

    .hidden { display: none !important; }
    
    /* Haupt-Buttons */
    .btn-primary { 
      background: var(--accent); color: white; border: none; 
      padding: 22px; border-radius: 20px; width: 100%; font-size: 20px; font-weight: bold;
    }
    .btn-ghost { 
      background: none; border: 1px solid #cbd5e0; color: #718096; 
      padding: 15px; border-radius: 15px; font-size: 16px; margin-top: 20px;
    }

    #btnBackBottom { 
      color: #e53e3e; font-weight: bold; margin-top: 50px; border: 1px solid #fed7d7; 
      background: #fff5f5; padding: 20px; border-radius: 15px; width: 100%;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div id="ui-home">
      <h1 style="text-align:center; font-weight: 300;">Seelenimpuls</h1>
      <div style="padding: 50px 10px; text-align:center;">
        <p id="impuls" style="font-size: 28px; font-style: italic;">Atme tief ein.</p>
        <button class="btn-ghost" id="btnImpuls" style="border: none;">Neuer Impuls</button>
      </div>
      <button class="btn-primary" id="btnContinue">Übung wählen</button>
    </div>

    <div id="ui-chooser" class="hidden">
      <div id="situationsList">
        <button class="situationBtn" id="btnSituation1"><span class="headline">1) Innere Unruhe</span><span class="hint">Gedanken kreisen</span></button>
        <button class="situationBtn" id="btnSituation2"><span class="headline">2) Überforderung</span><span class="hint">Alles zu viel</span></button>
        <button class="situationBtn" id="btnSituation3"><span class="headline">3) Anspannung</span><span class="hint">Körperlich loslassen</span></button>
        <button class="situationBtn" id="btnSituation4"><span class="headline">4) Erschöpfung</span><span class="hint">Kraft tanken</span></button>
        <button class="situationBtn" id="btnSituation5"><span class="headline">5) Traurigkeit</span><span class="hint">Gefühle annehmen</span></button>
        <button class="situationBtn" id="btnSituation6"><span class="headline">6) Innere Leere</span><span class="hint">Halt finden</span></button>
        <button class="situationBtn" id="btnSituation7"><span class="headline">7) Selbstzweifel</span><span class="hint">Wieder vertrauen</span></button>
        <button class="situationBtn" id="btnSituation8"><span class="headline">8) Entscheidung</span><span class="hint">Klarheit finden</span></button>
        <button class="situationBtn" id="btnSituation9"><span class="headline">9) Übergang</span><span class="hint">Neues beginnen</span></button>
        <button class="situationBtn" id="btnSituation10"><span class="headline">10) Angst & Sicherheit</span><span class="hint">Geborgen sein</span></button>
      </div>
      <button class="btn-ghost" id="btnBackFromChooser" style="width:100%;">Zurück</button>
    </div>

    <div id="ui-run" class="hidden">
      <div id="blocksContainer">
        <div class="block hidden" id="b1"><span class="block-header">🌿 Ankommen</span><p class="typed" id="t1"></p></div>
        <div class="block hidden" id="b2"><span class="block-header">💡 Einblick</span><p class="typed" id="t2"></p></div>
        <div id="breathBox" class="breath-container"><div class="breath-circle"></div><p>Atme tief ein... und aus...</p></div>
        <div class="block hidden" id="b3"><span class="block-header">✨ Kraftsätze</span><ul id="t3"></ul></div>
        <div class="block hidden" id="b4"><span class="block-header">🌙 Mini-Ritual</span><ul id="t4"></ul></div>
        <div class="block hidden" id="b5"><span class="block-header">🎶 Abschluss</span><p class="typed" id="t5"></p><div id="audioContainer"></div></div>
      </div>
      <button id="btnBackBottom">ÜBUNG BEENDEN</button>
    </div>
  </div>

  <script src="situations/situation-1.js"></script>
  <script src="situations/situation-2.js"></script>
  <script src="situations/situation-3.js"></script>
  <script src="situations/situation-4.js"></script>
  <script src="situations/situation-5.js"></script>
  <script src="situations/situation-6.js"></script>
  <script src="situations/situation-7.js"></script>
  <script src="situations/situation-8.js"></script>
  <script src="situations/situation-9.js"></script>
  <script src="situations/situation-10.js"></script>
  <script src="app.js"></script>
</body>
</html>
