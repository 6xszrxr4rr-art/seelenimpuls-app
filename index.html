<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Seelenimpuls</title>
  <style>
    :root {
      --accent: #4a90e2;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --bg: #f5f7fa;
    }
    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      color: var(--text); background: var(--bg); padding: 20px;
    }
    .wrap { max-width: 500px; margin: 0 auto; }
    
    /* Blöcke & Überschriften */
    .block {
      background: white; padding: 30px; border-radius: 28px; margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8);
    }
    .block-header {
      display: flex; align-items: center; gap: 8px; font-weight: 700;
      font-size: 15px; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--accent); margin-bottom: 20px;
    }

    /* Große, gut lesbare Schrift */
    .typed { font-size: 22px; line-height: 1.7; white-space: pre-wrap; }
    ul { list-style: none; padding: 0; }
    li { font-size: 21px; margin-bottom: 18px; padding-left: 35px; position: relative; }
    li::before { content: '✨'; position: absolute; left: 0; }

    /* Buttons volle Breite */
    .btn-primary { 
      background: var(--accent); color: white; border: none; padding: 22px; 
      border-radius: 20px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer;
    }
    .situationBtn {
      width: 100%; background: white; border: 1px solid #eee; padding: 25px;
      border-radius: 20px; margin-bottom: 15px; text-align: left; display: block;
    }
    .headline { font-size: 20px; font-weight: bold; display: block; margin-bottom: 4px; }
    .hint { font-size: 15px; color: var(--muted); }

    .btn-ghost { 
      background: white; color: var(--accent); border: 2.5px solid var(--accent);
      padding: 12px 30px; border-radius: 15px; font-weight: bold; font-size: 16px; 
    }
    
    #btnBackBottom { 
      background: #fff5f5; border: 1.5px solid #feb2b2; color: #c53030;
      width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; margin-top: 40px;
    }

    .hidden { display: none !important; }
    .breath-container { display: none; text-align: center; padding: 40px 0; }
    .breath-circle {
      width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent);
      margin: 0 auto; animation: breathe 8s infinite ease-in-out;
    }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.5); opacity: 1; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="ui-home">
      <h1 style="text-align: center; font-weight: 300;">Seelenimpuls</h1>
      <div style="padding: 60px 10px; text-align: center;">
        <p id="impuls" style="font-size: 26px; font-style: italic;">Atme tief ein. Du darfst ankommen.</p>
        <button class="btn-ghost" id="btnImpuls" style="margin-top:20px;">Neuer Impuls</button>
      </div>
      <button class="btn-primary" id="btnContinue">Übung wählen</button>
    </div>

    <div id="ui-chooser" class="hidden">
      <div id="situationsList">
        <button class="situationBtn" id="btnSituation1"><span class="headline">1) Innere Unruhe</span><span class="hint">Gedanken kreisen</span></button>
        <button class="situationBtn" id="btnSituation2"><span class="headline">2) Überforderung</span><span class="hint">Alles zu viel</span></button>
        <button class="situationBtn" id="btnSituation3"><span class="headline">3) Anspannung</span><span class="hint">Körperlich loslassen</span></button>
        <button class="situationBtn" id="btnSituation4"><span class="headline">4) Erschöpfung</span><span class="hint">Kraft tanken</span></button>
        <button class="situationBtn" id="btnSituation5"><span class="headline">5) Traurigkeit</span><span class="hint">Gefühle zulassen</span></button>
        <button class="situationBtn" id="btnSituation6"><span class="headline">6) Innere Leere</span><span class="hint">Halt finden</span></button>
        <button class="situationBtn" id="btnSituation7"><span class="headline">7) Selbstzweifel</span><span class="hint">Vertrauen finden</span></button>
        <button class="situationBtn" id="btnSituation8"><span class="headline">8) Entscheidung</span><span class="hint">Klarheit gewinnen</span></button>
        <button class="situationBtn" id="btnSituation9"><span class="headline">9) Übergang</span><span class="hint">Neues begrüßen</span></button>
        <button class="situationBtn" id="btnSituation10"><span class="headline">10) Angst & Sicherheit</span><span class="hint">Geborgen sein</span></button>
      </div>
      <button class="btn-ghost" id="btnBackFromChooser" style="width:100%; border:none; color:var(--muted);">Zurück</button>
    </div>

    <div id="ui-run" class="hidden">
      <div id="blocksContainer">
        <div class="block hidden" id="b1"><div class="block-header">🌿 Ankommen</div><p class="typed" id="t1"></p></div>
        <div class="block hidden" id="b2"><div class="block-header">💡 Einblick</div><p class="typed" id="t2"></p></div>
        <div id="breathBox" class="breath-container"><div class="breath-circle"></div><p style="margin-top:15px; color:var(--accent)">Einatmen... Ausatmen...</p></div>
        <div class="block hidden" id="b3"><div class="block-header">✨ Kraftsätze</div><ul id="t3"></ul></div>
        <div class="block hidden" id="b4"><div class="block-header">🌙 Mini-Ritual</div><ul id="t4"></ul></div>
        <div class="block hidden" id="b5"><div class="block-header">🎶 Abschluss</div><p class="typed" id="t5"></p><div id="audioContainer"></div></div>
      </div>
      <button id="btnBackBottom">ÜBUNG BEENDEN</button>
    </div>
  </div>

  <script src="situations/situation-1.js"></script>
  <script src="situations/situation-2.js"></script>
  <script src="situations/situation-3.js"></script>
  <script src="situations/situation-4.js"></script>
  <script src="situations/situation-5.js"></script>
  <script src="situations/situation-6.js"></script>
  <script src="situations/situation-7.js"></script>
  <script src="situations/situation-8.js"></script>
  <script src="situations/situation-9.js"></script>
  <script src="situations/situation-10.js"></script>
  <script src="app.js"></script>
</body>
</html>
