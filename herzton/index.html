<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Herzton – Persönliche Lieder zum Verschenken</title>
  <style>
    :root { --accent: #c0607a; --text: #2c3e50; }

    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, #fce4ec, #f8bbd0, #fce4ec, #fff0f3);
      background-size: 400% 400%; animation: gradientBG 15s ease infinite;
      min-height: 100vh; padding: 20px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wrap { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }

    header {
      text-align: center; padding: 40px 0 30px;
    }
    header .icon { font-size: 48px; display: block; margin-bottom: 10px; }
    header h1 {
      margin: 0; font-size: 32px; font-weight: 300;
      letter-spacing: 3px; color: var(--accent);
    }
    header p {
      margin: 8px 0 0; font-size: 15px; color: #888;
    }

    .block {
      background: rgba(255,255,255,0.94); padding: 28px; border-radius: 24px;
      margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .block-header {
      font-weight: 700; font-size: 12px; text-transform: uppercase;
      letter-spacing: 2px; color: var(--accent); margin-bottom: 14px;
    }

    .song-btn {
      width: 100%; background: rgba(255,255,255,0.9); border: 1px solid #f0ccd4;
      padding: 20px 22px; border-radius: 18px; margin-bottom: 12px;
      text-align: left; cursor: pointer; transition: all 0.2s;
    }
    .song-btn:hover { background: rgba(192,96,122,0.07); border-color: var(--accent); }
    .song-btn.selected { background: rgba(192,96,122,0.1); border-color: var(--accent); border-width: 2px; }
    .song-btn .label { display: block; font-size: 17px; font-weight: 600; color: var(--text); }
    .song-btn .hint { display: block; font-size: 14px; color: #999; margin-top: 3px; }

    input[type="text"] {
      width: 100%; padding: 16px; font-size: 20px;
      border: 1.5px solid #f0ccd4; border-radius: 14px;
      outline: none; font-family: inherit; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent); color: white; border: none;
      padding: 18px; border-radius: 18px; width: 100%;
      font-size: 18px; font-weight: bold; cursor: pointer;
      margin-top: 14px; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      background: none; border: 1.5px solid #ddd; color: #999;
      padding: 14px; border-radius: 16px; width: 100%;
      font-size: 15px; cursor: pointer; margin-top: 10px;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: #aaa; color: #666; }

    .btn-secondary {
      flex: 1; padding: 16px; border-radius: 18px;
      border: 1.5px solid var(--accent); background: white;
      color: var(--accent); font-size: 16px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-secondary:hover { background: rgba(192,96,122,0.07); }

    .lyrics {
      white-space: pre-wrap; font-size: 17px; line-height: 1.9;
      color: #2c3e50; font-style: italic;
    }

    .result-card {
      border: 2px solid rgba(192,96,122,0.25);
      background: rgba(192,96,122,0.03);
    }

    .action-row {
      display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;
    }

    .back-link {
      text-align: center; margin-top: 30px;
    }
    .back-link a {
      color: #bbb; font-size: 14px; text-decoration: none;
    }
    .back-link a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="icon">🎵</span>
      <h1>HERZTON</h1>
      <p>Persönliche Liedtexte zum Verschenken</p>
    </header>

    <div id="app"></div>

    <div class="back-link">
      <a href="../">← zurück zu Seelenimpuls</a>
    </div>
  </div>

  <script>
    const songs = [
      {
        id: "mann",
        label: "🎩 Für den Mann – Klassisch",
        hint: "Warm & herzlich",
        lyrics: `Heute ist dein großer Tag, [NAME],
ein Tag, der nach dir ruft.
Du trägst das Jahr mit Würde –
und noch viel mehr, das weißt du selbst.

Alles Gute, lieber [NAME],
möge dieses Jahr dir schenken,
was dein Herz sich heimlich wünscht
und was du selten denkst.

Prost auf dich, auf [NAME] –
der die Welt ein bisschen besser macht.
Herzlichen Glückwunsch! 🥂`
      },
      {
        id: "frau",
        label: "🌸 Für die Frau – Romantisch",
        hint: "Zart & gefühlvoll",
        lyrics: `Es gibt einen Menschen, der leuchtet –
und dieser Mensch bist du, [NAME].
Heute zünden wir Kerzen für dich
und feiern alles, was du bist.

Herzlichen Glückwunsch, liebe [NAME],
du machst das Leben schöner.
Möge heute alles stimmen –
für dich, die Strahlendste.

Auf dich, auf [NAME], auf diesen Tag –
der ganz allein dir gehört. 🌸`
      },
      {
        id: "kind",
        label: "🎈 Für ein Kind – Fröhlich",
        hint: "Bunt & energiegeladen",
        lyrics: `Hipp hipp hurra! Wer hat denn heut Geburtstag?
Na klar, das bist du – [NAME]!
Einmal, zweimal, dreimal hoch –
[NAME] lebe hoch, lebe hoch, lebe hoch!

Du bist jetzt ein Jahr größer,
ein Jahr klüger, ein Jahr cooler!
Herzlichen Glückwunsch, kleiner [NAME] –
heute ist dein Tag! Feier ihn! 🎉`
      },
      {
        id: "angeber",
        label: "😎 Für den Angeber – Witzig",
        hint: "Frech & selbstironisch",
        lyrics: `Wer ist der Beste? Natürlich – [NAME]!
Wer ist der Schönste? Ja, [NAME]!
Wer ist bescheiden? Na ja... nicht ganz –
aber das macht [NAME] auch so toll!

Herzlichen Glückwunsch, du Star!
Heute darfst du es noch lauter sagen.
[NAME] – die Welt dreht sich um dich,
zumindest heute. Geniess es! 😄`
      },
      {
        id: "jubilaeum",
        label: "🥂 Jubiläum – Feierlich",
        hint: "Würdevoll & festlich",
        lyrics: `Heute feiern wir [NAME] –
und all das, was entstanden ist.
Jahre kommen, Jahre gehen,
doch [NAME] bleibt – und das ist gut.

Ein Hoch auf diesen besonderen Tag,
auf [NAME] und auf alles Schöne.
Herzlichen Glückwunsch zum Jubiläum –
möge noch vieles folgen! 🥂`
      }
    ];

    let selected = null;

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="block">
          <div class="block-header">🎂 Anlass & Stil wählen</div>
          <div id="song-list"></div>
        </div>
        <div class="block" id="name-block" style="display:none;">
          <div class="block-header">✍️ Name eingeben</div>
          <input type="text" id="name-input" placeholder="Name…" autocomplete="off" />
          <button class="btn-primary" id="gen-btn">Liedtext erstellen ✨</button>
        </div>
        <div id="result"></div>
      `;

      const list = document.getElementById('song-list');
      songs.forEach(song => {
        const btn = document.createElement('button');
        btn.className = 'song-btn' + (selected && selected.id === song.id ? ' selected' : '');
        btn.innerHTML = `<span class="label">${song.label}</span><span class="hint">${song.hint}</span>`;
        btn.onclick = () => {
          selected = song;
          render();
          setTimeout(() => {
            document.getElementById('name-block').style.display = 'block';
            document.getElementById('name-input').focus();
          }, 10);
        };
        list.appendChild(btn);
      });

      if (selected) {
        document.getElementById('name-block').style.display = 'block';
      }

      document.getElementById('gen-btn').onclick = () => {
        const name = document.getElementById('name-input').value.trim();
        if (!name) { document.getElementById('name-input').style.borderColor = '#e74c3c'; return; }
        showResult(selected, name);
      };
    }

    function showResult(song, name) {
      const lyrics = song.lyrics.replace(/\[NAME\]/g, name);
      const result = document.getElementById('result');
      result.innerHTML = `
        <div class="block result-card">
          <div class="block-header">🎵 Für ${name}</div>
          <div class="lyrics">${lyrics}</div>
          <div class="action-row">
            <button class="btn-primary" id="share-btn" style="flex:1;margin-top:0;">📤 Teilen</button>
            <button class="btn-secondary" id="copy-btn">📋 Kopieren</button>
          </div>
          <button class="btn-ghost" id="new-btn">← Anderen Stil wählen</button>
        </div>
      `;
      result.scrollIntoView({ behavior: 'smooth' });

      document.getElementById('share-btn').onclick = async () => {
        const text = `Für ${name} 🎂\n\n${lyrics}\n\n– Erstellt mit Herzton`;
        if (navigator.share) {
          try { await navigator.share({ text }); } catch(e) {}
        } else {
          await navigator.clipboard?.writeText(text);
          const b = document.getElementById('share-btn');
          if (b) { b.textContent = '✅ Kopiert!'; setTimeout(() => b.textContent = '📤 Teilen', 2000); }
        }
      };

      document.getElementById('copy-btn').onclick = async () => {
        await navigator.clipboard?.writeText(`Für ${name}:\n\n${lyrics}`);
        const b = document.getElementById('copy-btn');
        if (b) { b.textContent = '✅'; setTimeout(() => b.textContent = '📋 Kopieren', 2000); }
      };

      document.getElementById('new-btn').onclick = () => {
        result.innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
    }

    render();
  </script>
</body>
</html>
